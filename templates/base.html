<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>County Waste Management ERP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            background:#f4f6f9;
        }

        .navbar-custom{
            background:linear-gradient(90deg,#198754,#146c43);
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .navbar-brand{
            font-weight:bold;
            color:white !important;
        }

        .nav-link{
            color:white !important;
            font-weight:500;
        }

        .nav-link:hover{
            color:#d8f3dc !important;
        }

        .county-badge{
            background:white;
            color:#198754;
            padding:8px 15px;
            border-radius:20px;
            font-size:13px;
            font-weight:bold;
        }

        .quick-stat{
            background:white;
            border-radius:15px;
            padding:20px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,.08);
            height:100%;
        }

        .content-area{
            padding:20px;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 2px 8px rgba(0,0,0,.08);
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom">

    <div class="container-fluid">

        <a class="navbar-brand" href="{% url 'dashboard' %}">
            <i class="fas fa-recycle"></i>
            County Waste ERP
        </a>

        <button class="navbar-toggler bg-light"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'dashboard' %}">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'customers' %}">
                        Billing
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'routes' %}">
                        Collection
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'complaints' %}">
                        Complaints
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'vehicles' %}">
                        Fleet
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'inventory' %}">
                        Recycling
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'truck_entries' %}">
                        Landfill
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'gis_dashboard' %}">
                        GIS
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'reports_dashboard' %}">
                        Reports
                    </a>
                </li>

            </ul>

        </div>

        <span class="county-badge">
            Watch Demo Videos
        </span>

    </div>

</nav>

<div class="container-fluid mt-4">

    <div class="row g-3">

        <div class="col-6 col-md-3">
            <div class="quick-stat">
                <h6>Total Revenue</h6>
                <h4 class="text-success">KES 24.5M</h4>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="quick-stat">
                <h6>Waste Collected</h6>
                <h4 class="text-primary">12,850 T</h4>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="quick-stat">
                <h6>Fleet Size</h6>
                <h4 class="text-warning">24</h4>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="quick-stat">
                <h6>Open Complaints</h6>
                <h4 class="text-danger">45</h4>
            </div>
        </div>

    </div>

</div>

<div class="content-area">

    {% block content %}
    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
